<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Apex | The Ultimate Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                }
            }
        }
    </script>
    
    <style>
        :root { --cursor-color: #3b82f6; }
        body { cursor: none; transition: background-color 0.5s ease; }
        .dark body { background-color: #020617; color: #f8fafc; }
        .light body { background-color: #f1f5f9; color: #0f172a; }

        /* Loading Screen */
        #loader {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #020617; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Custom Cursor */
        #custom-cursor {
            width: 20px; height: 20px; border: 2px solid var(--cursor-color); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10000;
            transition: transform 0.15s ease-out, background 0.3s ease, border-color 0.3s ease;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        /* Glassmorphism */
        .glass { backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.6); }
        .light .glass { background: rgba(255, 255, 255, 0.7); border-color: rgba(0, 0, 0, 0.05); }

        /* Skeleton Pulse */
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="selection:bg-blue-500/30 overflow-x-hidden">

    <div id="loader">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h1 class="text-white font-black tracking-widest text-xl animate-pulse">NEXUS APEX</h1>
    </div>

    <canvas id="particleCanvas" class="fixed inset-0 -z-10"></canvas>
    <div id="custom-cursor"></div>

    <nav class="fixed top-0 w-full z-50 glass border-b">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">🎮</div>
                <h1 class="text-xl font-extrabold tracking-tighter uppercase">Nexus<span class="text-blue-500">Apex</span></h1>
            </div>

            <div class="flex items-center gap-6">
                <div class="hidden md:flex flex-col items-end">
                    <div class="flex items-center gap-2">
                        <span id="user-rank" class="text-[10px] font-black text-blue-500 uppercase tracking-widest">NOOB</span>
                        <span class="text-xs font-bold">Lv. <span id="user-level">1</span></span>
                    </div>
                    <div class="w-32 h-1.5 bg-slate-300 dark:bg-white/10 rounded-full mt-1 overflow-hidden">
                        <div id="xp-progress" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="toggleTheme()" id="theme-btn" class="w-10 h-10 rounded-xl hover:bg-black/5 dark:hover:bg-white/5 transition-colors text-xl">🌙</button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-6">
        
        <section id="page-home">
            <div class="mb-12">
                <h2 class="text-5xl md:text-7xl font-black tracking-tighter leading-none mb-6">
                    READY FOR<br><span class="text-blue-500">NEXT LEVEL?</span>
                </h2>
                <div class="flex flex-wrap gap-4">
                    <input type="text" id="search-bar" placeholder="Search games..." class="px-6 py-4 rounded-2xl glass w-full md:w-80 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <select id="cat-filter" class="px-6 py-4 rounded-2xl glass outline-none cursor-none">
                        <option value="All">All Categories</option>
                        <option value="Arcade">Arcade</option>
                        <option value="Puzzle">Puzzle</option>
                    </select>
                </div>
            </div>

            <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </section>

        <section id="page-detail" class="hidden">
            <div class="flex flex-col lg:flex-row gap-12 items-center">
                <div class="w-full lg:w-1/2 aspect-video rounded-[2rem] overflow-hidden border shadow-2xl">
                    <img id="detail-img" src="" class="w-full h-full object-cover">
                </div>
                <div class="w-full lg:w-1/2">
                    <span id="detail-cat" class="text-blue-500 font-bold text-xs tracking-widest uppercase"></span>
                    <h2 id="detail-title" class="text-6xl font-black mt-4 mb-2 tracking-tighter"></h2>
                    
                    <div class="flex gap-4 mb-6 text-sm font-bold text-slate-500">
                        <p>Playtime: <span id="detail-time" class="text-blue-500">0m</span></p>
                        <p>Launches: <span id="detail-launches" class="text-blue-500">0</span></p>
                    </div>

                    <p id="detail-desc" class="text-xl opacity-70 mb-10 leading-relaxed"></p>
                    <div class="flex gap-4">
                        <button id="play-btn" class="px-10 py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black text-xl transition-all active:scale-95 cursor-none">PLAY NOW</button>
                        <button onclick="showPage('home')" class="px-8 py-5 glass rounded-2xl font-bold cursor-none">GO BACK</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- DATA & PERSISTENCE ---
        const games = [
            { id: '1', title: '2048', category: 'Puzzle', desc: 'Merge the tiles and get to 2048!', url: 'https://play2048.co/', thumb: 'https://images.unsplash.com/photo-1595303526913-c7037797ebe7?w=600' },
            { id: '2', title: 'Flappy Bird', category: 'Arcade', desc: 'The ultimate test of frustration and skill.', url: 'https://flappybird.io/', thumb: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600' },
            { id: '3', title: 'Hextris', category: 'Puzzle', desc: 'Fast-paced hexagonal block stacking.', url: 'https://hextris.io/', thumb: 'https://images.unsplash.com/photo-1614332287897-cdc485fa562d?w=600' },
            { id: '4', title: 'Star Shooter', category: 'Arcade', desc: 'Defend the galaxy from pixelated aliens.', url: 'https://freeinvaders.org/', thumb: 'https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?w=600' }
        ];

        let state = {
            xp: parseInt(localStorage.getItem('nx_xp')) || 0,
            lvl: parseInt(localStorage.getItem('nx_lvl')) || 1,
            theme: localStorage.getItem('nx_theme') || 'dark',
            stats: JSON.parse(localStorage.getItem('nx_stats')) || {}, // Format: { gameId: { time: 0, launches: 0 } }
            activeGameId: null,
            startTime: null
        };

        // --- CORE LOGIC ---
        function init() {
            applyTheme();
            renderSkeletons();
            
            // Loading screen delay
            window.addEventListener('load', () => {
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
                    renderGrid();
                }, 1500);
            });

            updateUIStats();
            initParticles();
            setupCursor();
            
            // Panic Key (`)
            window.addEventListener('keydown', (e) => { if (e.key === '`') window.location.href = 'https://google.com'; });

            // Tracking Interval: Save time every 30 seconds if a game is active
            setInterval(updateTimeSpent, 30000);
        }

        function renderSkeletons() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = Array(4).fill(0).map(() => `<div class="h-64 rounded-[2rem] skeleton opacity-50"></div>`).join('');
        }

        function renderGrid() {
            const grid = document.getElementById('game-grid');
            const filtered = games.filter(g => 
                (document.getElementById('cat-filter').value === 'All' || g.category === document.getElementById('cat-filter').value) &&
                g.title.toLowerCase().includes(document.getElementById('search-bar').value.toLowerCase())
            );

            grid.innerHTML = filtered.map(g => `
                <div onclick="openDetail('${g.id}')" class="group relative h-64 rounded-[2rem] overflow-hidden glass border hover:border-blue-500/50 transition-all duration-500 cursor-none">
                    <img src="${g.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-6">
                        <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">${g.category}</span>
                        <h3 class="text-2xl font-bold text-white">${g.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const g = games.find(i => i.id === id);
            const gStats = state.stats[id] || { time: 0, launches: 0 };

            document.getElementById('detail-title').innerText = g.title;
            document.getElementById('detail-desc').innerText = g.desc;
            document.getElementById('detail-img').src = g.thumb;
            document.getElementById('detail-cat').innerText = g.category;
            document.getElementById('detail-time').innerText = Math.floor(gStats.time / 60) + 'm';
            document.getElementById('detail-launches').innerText = gStats.launches;
            
            document.getElementById('play-btn').onclick = () => launchGame(g);
            showPage('detail');
        }

        function launchGame(g) {
            // Track launches
            if (!state.stats[g.id]) state.stats[g.id] = { time: 0, launches: 0 };
            state.stats[g.id].launches++;
            
            // Start time tracking session
            state.activeGameId = g.id;
            state.startTime = Date.now();
            
            // XP Gain
            state.xp += 15;
            if (state.xp >= 100) { state.xp = 0; state.lvl++; }
            saveState();
            updateUIStats();

            // Stealth Launch
            const win = window.open('about:blank', '_blank');
            win.document.title = "Google Docs";
            const iframe = win.document.createElement('iframe');
            iframe.src = g.url;
            iframe.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;border:none;";
            win.document.body.appendChild(iframe);
        }

        function updateTimeSpent() {
            if (state.activeGameId && state.startTime) {
                const now = Date.now();
                const secondsPassed = Math.floor((now - state.startTime) / 1000);
                state.stats[state.activeGameId].time += secondsPassed;
                state.startTime = now; // Reset start point for next interval
                saveState();
            }
        }

        // --- THEME & UI ---
        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            applyTheme();
            saveState();
        }

        function applyTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-btn');
            if (state.theme === 'dark') {
                html.classList.add('dark');
                btn.innerText = '🌙';
            } else {
                html.classList.remove('dark');
                btn.innerText = '☀️';
            }
        }

        function updateUIStats() {
            document.getElementById('user-level').innerText = state.lvl;
            document.getElementById('xp-progress').style.width = state.xp + '%';
            const ranks = ["Noob", "Casual", "Amateur", "Elite", "Pro", "Legend", "Apex"];
            document.getElementById('user-rank').innerText = ranks[Math.min(Math.floor(state.lvl / 2), 6)];
        }

        function saveState() {
            localStorage.setItem('nx_xp', state.xp);
            localStorage.setItem('nx_lvl', state.lvl);
            localStorage.setItem('nx_theme', state.theme);
            localStorage.setItem('nx_stats', JSON.stringify(state.stats));
        }

        function showPage(p) {
            document.getElementById('page-home').classList.toggle('hidden', p !== 'home');
            document.getElementById('page-detail').classList.toggle('hidden', p !== 'detail');
            if(p === 'home') renderGrid();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- VISUAL EFFECTS ---
        function setupCursor() {
            const cursor = document.getElementById('custom-cursor');
            window.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
            document.addEventListener('mouseover', (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.closest('[onclick]') || e.target.tagName === 'INPUT') {
                    cursor.style.transform = 'translate(-50%, -50%) scale(2.5)';
                    cursor.style.background = 'rgba(59, 130, 246, 0.2)';
                } else {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursor.style.background = 'transparent';
                }
            });
        }

        function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let pts = [];
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            window.onresize = resize; resize();
            for(let i=0; i<50; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3 });
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = state.theme === 'dark' ? "rgba(59, 130, 246, 0.2)" : "rgba(59, 130, 246, 0.1)";
                pts.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0 || p.x>canvas.width) p.vx *= -1; if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        document.getElementById('search-bar').oninput = renderGrid;
        document.getElementById('cat-filter').onchange = renderGrid;

        init();
    </script>
</body>
</html>
