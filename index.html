<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium Static Games Portal">
    <title>Nexus v2 | Premium Gaming</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'glow': 'glow 3s infinite alternate',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(59, 130, 246, 0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(59, 130, 246, 0.6)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { scroll-behavior: smooth; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        /* Staggered entry for cards */
        .game-card { opacity: 0; }
        .reveal { animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        
        /* Play Button Pulse */
        .btn-pulse:hover {
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            animation: pulse 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
        }
        @keyframes pulse {
            to { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 font-sans antialiased overflow-x-hidden">

    <nav class="fixed top-0 w-full z-[100] glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2 group cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center rotate-3 group-hover:rotate-12 transition-transform duration-300 shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                    <span class="text-2xl">🎮</span>
                </div>
                <h1 class="text-xl font-extrabold tracking-tighter bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">NEXUS<span class="text-blue-500 font-black">V2</span></h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="hidden md:flex gap-8 text-sm font-medium text-slate-400">
                    <a href="#" onclick="showPage('home')" class="hover:text-white transition-colors">Library</a>
                    <a href="#" class="hover:text-white transition-colors">Trending</a>
                    <a href="#" class="hover:text-white transition-colors">Favorites</a>
                </div>
                <button id="theme-toggle" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition-colors">🌓</button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-6">
        
        <section id="page-home" class="page-content">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-blue-600/10 blur-[120px] -z-10"></div>

            <div class="mb-12">
                <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter">DISCOVER<br><span class="text-blue-500">EXPERIENCES</span></h2>
                <div class="flex flex-col md:flex-row gap-4 mt-8">
                    <input type="text" id="search-input" placeholder="Search the nexus..." 
                        class="w-full md:w-96 px-6 py-4 rounded-2xl glass border-white/10 focus:border-blue-500/50 outline-none transition-all text-lg">
                    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                        <button onclick="filterCategory('All')" class="cat-btn px-6 py-4 rounded-2xl glass hover:bg-blue-600 transition-all font-bold whitespace-nowrap">All Games</button>
                        <button onclick="filterCategory('Arcade')" class="cat-btn px-6 py-4 rounded-2xl glass hover:bg-blue-600 transition-all font-bold whitespace-nowrap">Arcade</button>
                        <button onclick="filterCategory('Puzzle')" class="cat-btn px-6 py-4 rounded-2xl glass hover:bg-blue-600 transition-all font-bold whitespace-nowrap">Puzzle</button>
                    </div>
                </div>
            </div>

            <div id="recent-section" class="mb-16 hidden">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-[0.3em] mb-6">Jump back in</h3>
                <div id="recent-grid" class="flex gap-6 overflow-x-auto pb-4 no-scrollbar"></div>
            </div>

            <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                </div>
        </section>

        <section id="page-detail" class="page-content hidden animate-fade-in-up">
            <div class="grid lg:grid-cols-2 gap-12 items-center">
                <div class="relative group">
                    <div class="absolute -inset-4 bg-blue-600/20 blur-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <img id="detail-img" src="" class="relative w-full aspect-video object-cover rounded-[2rem] shadow-2xl border border-white/10">
                </div>
                <div>
                    <span id="detail-cat" class="px-4 py-1.5 rounded-full bg-blue-600/20 text-blue-400 text-xs font-bold tracking-widest uppercase border border-blue-500/20"></span>
                    <h2 id="detail-title" class="text-6xl font-black mt-6 mb-4 tracking-tighter leading-none"></h2>
                    <p id="detail-desc" class="text-xl text-slate-400 mb-10 leading-relaxed font-light"></p>
                    <div class="flex gap-4">
                        <button id="btn-play" class="btn-pulse flex-grow md:flex-grow-0 px-12 py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-extrabold text-xl transition-all active:scale-95 shadow-[0_10px_40px_rgba(37,99,235,0.3)]">
                            LAUNCH GAME
                        </button>
                        <button onclick="showPage('home')" class="px-8 py-5 glass hover:bg-white/10 rounded-2xl font-bold transition-all">
                            EXIT
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const gamesData = [
            { id: '1', title: '2048', description: 'Master the tiles in this ultra-smooth version of the classic math puzzle. Merge numbers to reach the ultimate goal.', url: 'https://play2048.co/', thumbnail: 'https://images.unsplash.com/photo-1595303526913-c7037797ebe7?w=800&q=80', category: 'Puzzle' },
            { id: '2', title: 'Retro Bird', description: 'A high-fidelity flappy experience. Navigate through the pipes with precision and style in this neon-lit clone.', url: 'https://flappybird.io/', thumbnail: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800&q=80', category: 'Arcade' },
            { id: '3', title: 'Hextris', description: 'A fast-paced hexagonal puzzle game that challenges your reflexes and spatial awareness.', url: 'https://hextris.io/', thumbnail: 'https://images.unsplash.com/photo-1614332287897-cdc485fa562d?w=800&q=80', category: 'Puzzle' },
            { id: '4', title: 'Star Defender', description: 'The retro space shooter reborn. Defend the nexus from relentless waves of pixelated alien invaders.', url: 'https://freeinvaders.org/', thumbnail: 'https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?w=800&q=80', category: 'Arcade' },
            { id: '5', title: 'Tetris Web', description: 'The most popular block-stacking game in history. Simple, addictive, and eternal.', url: 'https://tetris.com/play-tetris', thumbnail: 'https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=800&q=80', category: 'Puzzle' }
        ];

        let state = {
            category: 'All',
            search: '',
            recent: JSON.parse(localStorage.getItem('nexus-recent') || '[]')
        };

        function init() {
            renderGrid();
            renderRecent();
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                state.search = e.target.value.toLowerCase();
                renderGrid();
            });

            // Theme toggle stub (already dark by default for "better UI")
            document.getElementById('theme-toggle').onclick = () => {
                document.documentElement.classList.toggle('light');
                document.documentElement.classList.toggle('dark');
            };
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            if(pageId === 'home') renderGrid();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderGrid() {
            const grid = document.getElementById('game-grid');
            const filtered = gamesData.filter(g => {
                const matchesCat = state.category === 'All' || g.category === state.category;
                const matchesSearch = g.title.toLowerCase().includes(state.search);
                return matchesCat && matchesSearch;
            });

            grid.innerHTML = filtered.map((game, index) => `
                <div onclick="openDetails('${game.id}')" 
                     class="game-card group cursor-pointer glass rounded-[2rem] overflow-hidden border border-white/5 hover:border-blue-500/50 transition-all duration-500 reveal"
                     style="animation-delay: ${index * 100}ms">
                    <div class="relative h-56 overflow-hidden">
                        <img src="${game.thumbnail}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent opacity-80"></div>
                        <div class="absolute bottom-4 left-6">
                             <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">${game.category}</span>
                             <h3 class="text-2xl font-bold text-white tracking-tighter">${game.title}</h3>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            state.category = cat;
            renderGrid();
        }

        function openDetails(id) {
            const game = gamesData.find(g => g.id === id);
            document.getElementById('detail-title').innerText = game.title;
            document.getElementById('detail-desc').innerText = game.description;
            document.getElementById('detail-img').src = game.thumbnail;
            document.getElementById('detail-cat').innerText = game.category;
            
            document.getElementById('btn-play').onclick = () => {
                addToRecent(game);
                launchCloaked(game.url);
            };
            
            showPage('detail');
        }

        function launchCloaked(url) {
            const win = window.open('about:blank', '_blank');
            if (!win) return alert("Pop-ups blocked!");

            win.document.title = "Google"; 
            const link = win.document.createElement('link');
            link.rel = 'icon';
            link.href = 'https://www.google.com/favicon.ico';
            win.document.head.appendChild(link);

            const iframe = win.document.createElement('iframe');
            iframe.src = url;
            iframe.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;border:none;margin:0;padding:0;";
            win.document.body.appendChild(iframe);
        }

        function addToRecent(game) {
            let recent = state.recent.filter(i => i.id !== game.id);
            recent.unshift(game);
            state.recent = recent.slice(0, 5);
            localStorage.setItem('nexus-recent', JSON.stringify(state.recent));
            renderRecent();
        }

        function renderRecent() {
            const container = document.getElementById('recent-section');
            const grid = document.getElementById('recent-grid');
            if (state.recent.length === 0) return;
            
            container.classList.remove('hidden');
            grid.innerHTML = state.recent.map(game => `
                <div onclick="openDetails('${game.id}')" class="flex-shrink-0 group cursor-pointer">
                    <div class="w-16 h-16 rounded-2xl glass p-1 border border-white/10 group-hover:border-blue-500 transition-all">
                        <img src="${game.thumbnail}" class="w-full h-full object-cover rounded-xl">
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
