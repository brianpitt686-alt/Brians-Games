<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Automatic Tab Cloak -->
    <title>Clever | Portal</title>
    <link id="favicon" rel="icon" href="https://clever.com/favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { accent: 'rgba(var(--accent-color), <alpha-value>)' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Instant Theme Loader to prevent flashes -->
    <script>
        const savedTheme = localStorage.getItem('nx_theme') || 'dark';
        const savedColor = localStorage.getItem('nx_color') || '59, 130, 246';
        document.documentElement.className = savedTheme;
        document.documentElement.style.setProperty('--accent-color', savedColor);
    </script>

    <style>
        :root { 
            --accent-color: 59, 130, 246; /* Default Blue, overridden by script above */
            --cursor-color: rgb(var(--accent-color)); 
        }
        body { cursor: none; transition: background-color 0.5s ease; scroll-behavior: smooth; overflow-x: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }
        .dark body { background-color: #020617; color: #f8fafc; }
        .light body { background-color: #f1f5f9; color: #0f172a; }
        #loader { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; transition: opacity 0.8s ease; }
        #custom-cursor { width: 20px; height: 20px; border: 2px solid var(--cursor-color); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transition: transform 0.1s ease-out; transform: translate(-50%, -50%); }
        #stats-dashboard { position: fixed; top: 0; right: 0; height: 100vh; width: 400px; z-index: 60; transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        #stats-dashboard.active { transform: translateX(0); }
        .glass { backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
        .light .glass { background: rgba(255, 255, 255, 0.85); border-color: rgba(0,0,0,0.05); }
    </style>
</head>
<body class="selection:bg-accent/30">

    <!-- Background Music Audio Element -->
    <!-- Added autoplay attribute to try starting immediately -->
    <audio id="bgm" loop preload="auto" autoplay>
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg">
    </audio>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="w-12 h-12 border-4 border-accent border-t-transparent rounded-full animate-spin mb-4"></div>
        <h1 class="text-white font-black tracking-widest text-lg animate-pulse uppercase">Nexus Booting...</h1>
    </div>

    <!-- Custom Mouse Cursor -->
    <div id="custom-cursor"></div>

    <!-- Navigation Bar -->
    <nav class="fixed top-0 w-full z-50 glass border-b h-20 flex items-center justify-between px-8">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
            <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-lg text-white font-bold transition-colors duration-500">B</div>
            <h1 class="text-xl font-extrabold tracking-tighter uppercase">Nexus<span class="text-accent transition-colors duration-500">Apex</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="toggleDashboard()" class="flex flex-col items-end group">
                <span id="user-rank" class="text-[10px] font-black text-accent uppercase tracking-widest transition-colors duration-500">NOOB</span>
                <div class="w-24 h-1.5 bg-slate-300 dark:bg-white/10 rounded-full mt-1 overflow-hidden">
                    <div id="xp-progress" class="h-full bg-accent transition-all duration-500" style="width: 0%"></div>
                </div>
            </button>
            <button onclick="toggleMusic()" id="music-btn" class="text-xl hover:scale-110 transition-transform" title="Toggle Background Music">🔊</button>
            <button onclick="toggleCloak()" id="cloak-btn" class="text-xl hover:scale-110 transition-transform" title="Toggle Clever Cloak">🥸</button>
            <button onclick="toggleSettings()" class="text-xl hover:scale-110 transition-transform" title="Settings">⚙️</button>
            <button onclick="toggleTheme()" id="theme-btn" class="text-xl hover:scale-110 transition-transform" title="Toggle Light/Dark">🌙</button>
        </div>
    </nav>

    <!-- Stats Dashboard Sidebar -->
    <div id="stats-dashboard" class="glass border-l p-8 shadow-2xl overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black uppercase">User <span class="text-accent transition-colors">Stats</span></h2>
            <button onclick="toggleDashboard()" class="text-xs font-bold opacity-50 hover:opacity-100">CLOSE</button>
        </div>
        <div id="dashboard-content" class="space-y-4">
             <div class="p-6 rounded-2xl bg-accent/10 border border-accent/20 transition-colors duration-500">
                <p class="text-[10px] font-bold text-accent uppercase transition-colors">Total Playtime</p>
                <p id="total-time-global" class="text-3xl font-black">0m</p>
            </div>
            <div id="game-stats-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="glass p-8 rounded-3xl w-full max-w-sm border border-white/10 shadow-2xl relative">
            <button onclick="toggleSettings()" class="absolute top-6 right-6 font-bold opacity-50 hover:opacity-100 text-xs">CLOSE</button>
            <h2 class="text-2xl font-black uppercase mb-6">Settings</h2>
            <div>
                <p class="text-xs font-bold text-accent uppercase mb-4">Theme Color</p>
                <div class="flex gap-4">
                    <button onclick="setColor('59, 130, 246')" class="w-12 h-12 rounded-full bg-[#3b82f6] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                    <button onclick="setColor('168, 85, 247')" class="w-12 h-12 rounded-full bg-[#a855f7] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                    <button onclick="setColor('34, 197, 94')" class="w-12 h-12 rounded-full bg-[#22c55e] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                    <button onclick="setColor('239, 68, 68')" class="w-12 h-12 rounded-full bg-[#ef4444] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Custom Game Modal -->
    <div id="add-game-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="glass p-8 rounded-3xl w-full max-w-md border border-white/10 shadow-2xl relative">
            <button onclick="toggleAddGame()" class="absolute top-6 right-6 font-bold opacity-50 hover:opacity-100 text-xs">CANCEL</button>
            <h2 class="text-2xl font-black uppercase mb-6">Add <span class="text-accent">Custom</span> Game</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold uppercase opacity-60">Game Title</label>
                    <input type="text" id="cg-title" class="w-full mt-1 bg-black/20 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent glass text-white placeholder-white/30">
                </div>
                <div>
                    <label class="text-xs font-bold uppercase opacity-60">Game URL (Link)</label>
                    <input type="text" id="cg-url" class="w-full mt-1 bg-black/20 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent glass text-white placeholder-white/30">
                </div>
                <div>
                    <label class="text-xs font-bold uppercase opacity-60">Cover Image URL (Optional)</label>
                    <input type="text" id="cg-img" class="w-full mt-1 bg-black/20 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent glass text-white placeholder-white/30" placeholder="https://example.com/image.jpg">
                </div>
                <button onclick="saveCustomGame()" class="w-full py-4 mt-4 bg-accent hover:opacity-80 text-white rounded-xl font-black text-lg transition-all shadow-xl">ADD TO LIBRARY</button>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="pt-32 pb-10 max-w-7xl mx-auto px-6 min-h-[calc(100vh-80px)] flex flex-col justify-between">
        <div>
            <!-- Home Library Section -->
            <section id="page-home">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                    <h2 class="text-5xl md:text-6xl font-black tracking-tighter uppercase">My <span class="text-accent transition-colors duration-500">Library</span></h2>
                    <div class="flex gap-4 w-full md:w-auto">
                        <input type="text" id="search-input" oninput="renderGrid()" placeholder="Search games..." class="w-full md:w-64 bg-black/5 dark:bg-black/20 border border-black/10 dark:border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-accent glass placeholder-current/50 transition-colors">
                        <button onclick="toggleAddGame()" class="shrink-0 px-6 py-4 glass hover:bg-black/5 dark:hover:bg-white/5 rounded-2xl border border-black/10 dark:border-white/10 font-bold transition-all text-xl" title="Add Custom Game">+</button>
                    </div>
                </div>
                <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </section>

            <!-- Game Detail Section -->
            <section id="page-detail" class="hidden">
                <div class="flex flex-col lg:flex-row gap-12 items-center">
                    <img id="detail-img" class="w-full lg:w-1/2 aspect-video rounded-[2rem] object-cover border shadow-2xl">
                    <div class="w-full lg:w-1/2">
                        <h2 id="detail-title" class="text-6xl font-black mb-4 tracking-tighter"></h2>
                        <p id="detail-stats" class="text-sm font-bold opacity-60 mb-8">Time: 0m | Plays: 0</p>
                        <div class="flex gap-4">
                            <button id="play-btn" class="px-10 py-5 bg-accent hover:opacity-80 text-white rounded-2xl font-black text-xl transition-all shadow-xl">PLAY GAME</button>
                            <button onclick="showPage('home')" class="px-8 py-5 glass rounded-2xl font-bold hover:bg-black/5 dark:hover:bg-white/5 transition-colors">BACK</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Copyright Footer -->

                &copy; <span id="current-year"></span> Brian Pitt. All Rights Reserved.
            </p>
        </footer>
    </main>

            { id: '105', title: 'Wordle', url: 'https://brianpitt686-alt.github.io/Brians-Games/Games/wordle/index.html', cover: 'https://1kh0.github.io/projects/wordle/thumb.png' },
            { id: '106', title: 'World’s Hardest Game', url: 'https://brianpitt686-alt.github.io/Brians-Games/Games/worlds-hardest-game/index.html', cover: 'https://1kh0.github.io/projects/worlds-hardest-game/thumb.png' },
            { id: '107', title: 'World’s Hardest Game 2', url: 'https://brianpitt686-alt.github.io/Brians-Games/Games/worlds-hardest-game-2/index.html', cover: 'https://1kh0.github.io/projects/worlds-hardest-game-2/thumb.png' },
            { id: '108', title: 'You Are Bezos', url: 'https://brianpitt686-alt.github.io/Brians-Games/Games/you-are-bezos/index.html', cover: 'https://1kh0.github.io/projects/you-are-bezos/thumb.png' },
        ];

        // Safe JSON parsing function to prevent errors on bad localStorage data
        function getSavedJSON(key, defaultVal) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : defaultVal;
            } catch (e) {
                return defaultVal;
            }
        }

        let state = {
            theme: localStorage.getItem('nx_theme') || 'dark',
            color: localStorage.getItem('nx_color') || '59, 130, 246',
            // Default to true (ON) unless specifically saved as false
            musicOn: localStorage.getItem('nx_music') !== 'false', 
            stats: getSavedJSON('nx_stats', {}),
            favorites: getSavedJSON('nx_favorites', []),
            customGames: getSavedJSON('nx_custom_games', []),
            hiddenGames: getSavedJSON('nx_hidden_games', []),
            activeGameId: null,
            startTime: null
        };

        function save() {
            localStorage.setItem('nx_stats', JSON.stringify(state.stats));
            localStorage.setItem('nx_theme', state.theme);
            localStorage.setItem('nx_color', state.color);
            localStorage.setItem('nx_music', state.musicOn);
            localStorage.setItem('nx_favorites', JSON.stringify(state.favorites));
            localStorage.setItem('nx_custom_games', JSON.stringify(state.customGames));
            localStorage.setItem('nx_hidden_games', JSON.stringify(state.hiddenGames));
            updateRankUI();
        }

        // --- MUSIC PLAYER ---
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.4; // Soft background volume

        function toggleMusic() {
            state.musicOn = !state.musicOn;
            updateMusicUI();
            save();
            
            if (state.musicOn) {
                bgm.play().catch(e => console.log("Waiting for user interaction to play audio."));
            } else {
                bgm.pause();
            }
        }

        function updateMusicUI() {
            document.getElementById('music-btn').innerText = state.musicOn ? "🔊" : "🔈";
        }

        function launchGame(g) {
            if (!state.stats[g.id]) state.stats[g.id] = { time: 0, launches: 0 };
            state.stats[g.id].launches++;
            state.activeGameId = g.id;
            state.startTime = Date.now();
            save();

            const targetUrl = g.url || (repoBase + g.folder + "/index.html");
            
            const win = window.open('', '_blank');
            if (win) {
                win.document.body.style.margin = "0";
                win.document.body.style.height = "100vh";
                win.document.title = "Google Docs";
                const ifr = win.document.createElement('iframe');
                ifr.src = targetUrl;
                ifr.style.width = "100%";
                ifr.style.height = "100%";
                ifr.style.border = "none";
                win.document.body.appendChild(ifr);
            } else {
                alert("POPUP BLOCKED! Please allow popups for this site to play.");
            }
        }

        function updateTimeSpent() {
            if (state.activeGameId && state.startTime) {
                const diff = Math.floor((Date.now() - state.startTime) / 1000);
                state.stats[state.activeGameId].time += diff;
                state.startTime = Date.now();
                save();
            }
        }

        function updateRankUI() {
            let totalSeconds = Object.values(state.stats).reduce((acc, curr) => acc + curr.time, 0);
            let totalMinutes = Math.floor(totalSeconds / 60);

            const ranks = [
                { name: 'NOOB', min: 0, max: 30 },
                { name: 'GAMER', min: 30, max: 120 },
                { name: 'PRO', min: 120, max: 600 },
                { name: 'ELITE', min: 600, max: 1500 },
                { name: 'NEXUS LEGEND', min: 1500, max: 999999 }
            ];

            let currentRank = ranks[0];
            for (let r of ranks) {
                if (totalMinutes >= r.min) currentRank = r;
            }

            document.getElementById('user-rank').innerText = currentRank.name;
            
            let pct = 100;
            if (currentRank.max !== 999999) {
                const range = currentRank.max - currentRank.min;
                const earned = totalMinutes - currentRank.min;
                pct = Math.min(100, Math.max(0, (earned / range) * 100));
            }
            document.getElementById('xp-progress').style.width = pct + '%';
        }

        function renderGrid() {
            const grid = document.getElementById('game-grid');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            // Filter out deleted/hidden games
            let allGames = [...games, ...state.customGames].filter(g => !state.hiddenGames.includes(g.id));
            
            if (searchTerm) {
                allGames = allGames.filter(g => g.title.toLowerCase().includes(searchTerm));
            }

            // Sort logic: Favorites always top, then alphabetical
            allGames.sort((a, b) => {
                const aFav = state.favorites.includes(a.id);
                const bFav = state.favorites.includes(b.id);
                if (aFav !== bFav) return bFav - aFav; 
                return a.title.localeCompare(b.title);
            });

            grid.innerHTML = allGames.map(g => {
                const isFav = state.favorites.includes(g.id);
                return `
                <div onclick="openDetail('${g.id}')" class="group relative h-64 rounded-[2rem] overflow-hidden glass border hover:border-accent/50 transition-all duration-300 cursor-pointer bg-black/20">
                    <img src="${g.cover}" onerror="this.onerror=null; this.src='https://placehold.co/600x400/0f172a/cccccc?text=${encodeURIComponent(g.title)}&font=Montserrat'" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    
                    <!-- Delete Game Button -->
                    <button onclick="deleteGame(event, '${g.id}')" class="absolute top-4 left-4 text-xl z-10 transition-transform hover:scale-125 text-white/30 hover:text-red-500 bg-black/30 rounded-full w-8 h-8 flex items-center justify-center backdrop-blur-md" title="Remove Game">
                        🗑️
                    </button>

                    <!-- Favorite Game Button -->
                    <button onclick="toggleFav(event, '${g.id}')" class="absolute top-4 right-4 text-2xl z-10 transition-transform hover:scale-125 ${isFav ? 'text-yellow-400' : 'text-white/30 hover:text-white'}">
                        ${isFav ? '★' : '☆'}
                    </button>

                    <div class="absolute bottom-6 left-6 text-white pr-4">
                        <h3 class="text-xl font-bold uppercase tracking-tight break-words">${g.title}</h3>
                        ${g.id.toString().startsWith('c_') ? '<span class="text-[10px] bg-accent/30 text-accent px-2 py-1 rounded-full uppercase font-bold mt-2 inline-block">Custom</span>' : ''}
                    </div>
                </div>
            `}).join('');
        }

        function deleteGame(e, id) {
            e.stopPropagation(); // Prevent opening the game details
            if (confirm("Are you sure you want to remove this game from your library?")) {
                if (id.toString().startsWith('c_')) {
                    state.customGames = state.customGames.filter(g => g.id !== id);
                } else {
                    state.hiddenGames.push(id);
                }
                save();
                renderGrid();
            }
        }

        function toggleFav(e, id) {
            e.stopPropagation(); 
            if (state.favorites.includes(id)) {
                state.favorites = state.favorites.filter(favId => favId !== id);
            } else {
                state.favorites.push(id);
            }
            save();
            renderGrid();
        }

        function openDetail(id) {
            let allGames = [...games, ...state.customGames];
            const g = allGames.find(i => i.id === id);
            if (!g) return;

            const s = state.stats[id] || { time: 0, launches: 0 };
            document.getElementById('detail-title').innerText = g.title;
            
            const imgEl = document.getElementById('detail-img');
            imgEl.src = g.cover;
            imgEl.onerror = function() {
                this.onerror = null;
                this.src = `https://placehold.co/600x400/0f172a/cccccc?text=${encodeURIComponent(g.title)}&font=Montserrat`;
            };

            document.getElementById('detail-stats').innerText = `Time: ${Math.floor(s.time/60)}m | Plays: ${s.launches}`;
            document.getElementById('play-btn').onclick = () => launchGame(g);
            showPage('detail');
        }

        function toggleDashboard() {
            const db = document.getElementById('stats-dashboard');
            db.classList.toggle('active');
            if(db.classList.contains('active')) {
                let total = 0;
                let allGames = [...games, ...state.customGames].filter(g => !state.hiddenGames.includes(g.id));
                const list = document.getElementById('game-stats-list');
                list.innerHTML = '';
                allGames.forEach(g => {
                    const s = state.stats[g.id] || { time: 0, launches: 0 };
                    total += s.time;
                    if(s.launches > 0) {
                        list.innerHTML += `<div class="p-4 glass rounded-xl flex justify-between text-xs font-bold uppercase">
                            <span class="truncate pr-2">${g.title}</span>
                            <span class="text-accent shrink-0">${Math.floor(s.time/60)}m</span>
                        </div>`;
                    }
                });
                document.getElementById('total-time-global').innerText = Math.floor(total/60) + 'm';
            }
        }

        function showPage(p) {
            document.getElementById('page-home').classList.toggle('hidden', p !== 'home');
            document.getElementById('page-detail').classList.toggle('hidden', p !== 'detail');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- THEME & SETTINGS ---
        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.className = state.theme;
            save();
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
        }

        function setColor(rgb) {
            state.color = rgb;
            document.documentElement.style.setProperty('--accent-color', rgb);
            save();
        }

        // --- CUSTOM GAMES ---
        function toggleAddGame() {
            const modal = document.getElementById('add-game-modal');
            modal.classList.toggle('hidden');
        }

        function saveCustomGame() {
            const title = document.getElementById('cg-title').value.trim();
            const url = document.getElementById('cg-url').value.trim();
            let img = document.getElementById('cg-img').value.trim();

            if (!title || !url) {
                alert("Game Title and Game URL are required!");
                return;
            }

            const newGame = {
                id: 'c_' + Date.now(),
                title: title,
                url: url,
                cover: img || `https://placehold.co/600x400/0f172a/cccccc?text=${encodeURIComponent(title)}&font=Montserrat`
            };

            state.customGames.push(newGame);
            save();
            toggleAddGame();
            renderGrid();
            
            // Reset fields
            document.getElementById('cg-title').value = '';
            document.getElementById('cg-url').value = '';
            document.getElementById('cg-img').value = '';
        }

        // --- TAB CLOAK ---
        // Tab cloak is automatically on via the HTML <head> tags.
        let isCloaked = true; 
        const originalTitle = "Brian's Nexus | Elite";
        
        function toggleCloak() {
            isCloaked = !isCloaked;
            let link = document.getElementById("favicon");
            
            if (isCloaked) {
                document.title = "Clever | Portal";
                link.href = "https://clever.com/favicon.ico";
                document.getElementById('cloak-btn').innerText = "🥸"; 
            } else {
                document.title = originalTitle;
                link.href = "data:image/x-icon;base64,"; // Removes the favicon
                document.getElementById('cloak-btn').innerText = "👻"; 
            }
        }

        // --- INIT ---
        window.addEventListener('mousemove', (e) => {
            const c = document.getElementById('custom-cursor');
            c.style.left = e.clientX + 'px';
            c.style.top = e.clientY + 'px';
        });

        // Initialize UI from saved state
        updateMusicUI();

        // Attempt to play immediately on load
        if (state.musicOn) {
            // Note: Many modern browsers block audio autoplay until the user interacts with the page.
            let playPromise = bgm.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Browser autoplay policy prevented initial playback. Waiting for user interaction.");
                    
                    // Fallback: The second the user clicks ANYWHERE on the page, start the music.
                    document.body.addEventListener('click', () => {
                        if (state.musicOn && bgm.paused) {
                            bgm.play().catch(e => console.error("Still unable to play audio:", e));
                        }
                    }, { once: true });
                });
            }
        }

        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
            updateRankUI();
            renderGrid();
        }, 1000);

        setInterval(updateTimeSpent, 5000);
    </script>
</body>
</html>
