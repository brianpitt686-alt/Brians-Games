<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Ultimate | Pro Gaming Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    animation: {
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { cursor: none; background-color: #020617; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Custom Cursor */
        #custom-cursor {
            width: 20px; height: 20px; border: 2px solid #3b82f6; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            transition: transform 0.15s ease-out, background 0.3s ease;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        
        /* Skeleton Pulse */
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-100 selection:bg-blue-500/30">

    <canvas id="particleCanvas" class="fixed inset-0 -z-10"></canvas>
    <div id="custom-cursor"></div>

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">🎮</div>
                <h1 class="text-xl font-extrabold tracking-tighter uppercase">Nexus<span class="text-blue-500">Ult</span></h1>
            </div>

            <div class="flex items-center gap-6">
                <div class="hidden md:flex flex-col items-end">
                    <div class="flex items-center gap-2">
                        <span id="user-rank" class="text-[10px] font-black text-blue-400 uppercase tracking-widest">NOOB</span>
                        <span class="text-xs font-bold">Lv. <span id="user-level">1</span></span>
                    </div>
                    <div class="w-32 h-1.5 bg-white/10 rounded-full mt-1 overflow-hidden">
                        <div id="xp-progress" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl hover:bg-white/5 transition-colors">🌓</button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-6">
        
        <section id="page-home">
            <div class="mb-12 animate-float">
                <h2 class="text-5xl md:text-7xl font-black tracking-tighter leading-none mb-6">
                    LEVEL UP YOUR<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500">GAMEPLAY</span>
                </h2>
                <div class="flex flex-wrap gap-4">
                    <input type="text" id="search-bar" placeholder="Find a challenge..." class="px-6 py-4 rounded-2xl glass border-white/10 w-full md:w-80 outline-none focus:border-blue-500/50 transition-all">
                    <select id="cat-filter" class="px-6 py-4 rounded-2xl glass border-white/10 outline-none cursor-none">
                        <option value="All">All Categories</option>
                        <option value="Arcade">Arcade</option>
                        <option value="Puzzle">Puzzle</option>
                    </select>
                </div>
            </div>

            <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </section>

        <section id="page-detail" class="hidden">
            <div class="flex flex-col lg:flex-row gap-12 items-center">
                <div class="w-full lg:w-1/2 aspect-video rounded-[2rem] overflow-hidden border border-white/10 shadow-2xl">
                    <img id="detail-img" src="" class="w-full h-full object-cover">
                </div>
                <div class="w-full lg:w-1/2">
                    <span id="detail-cat" class="text-blue-400 font-bold text-xs tracking-widest uppercase"></span>
                    <h2 id="detail-title" class="text-6xl font-black mt-4 mb-6 tracking-tighter leading-none"></h2>
                    <p id="detail-desc" class="text-xl text-slate-400 mb-10 leading-relaxed"></p>
                    <div class="flex gap-4">
                        <button id="play-btn" class="px-10 py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xl shadow-xl shadow-blue-600/20 transition-all active:scale-95 cursor-none">LAUNCH GAME</button>
                        <button onclick="showPage('home')" class="px-8 py-5 glass rounded-2xl font-bold cursor-none">BACK</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- DATA & STATE ---
        const games = [
            { id: '1', title: '2048', category: 'Puzzle', desc: 'Merge tiles to reach 2048.', url: 'https://play2048.co/', thumb: 'https://images.unsplash.com/photo-1595303526913-c7037797ebe7?w=500' },
            { id: '2', title: 'Retro Bird', category: 'Arcade', desc: 'Flap through the obstacles.', url: 'https://flappybird.io/', thumb: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500' },
            { id: '3', title: 'Hextris', category: 'Puzzle', desc: 'Fast-paced hex puzzle action.', url: 'https://hextris.io/', thumb: 'https://images.unsplash.com/photo-1614332287897-cdc485fa562d?w=500' },
            { id: '4', title: 'Invaders', category: 'Arcade', desc: 'Classic space shooter defense.', url: 'https://freeinvaders.org/', thumb: 'https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?w=500' }
        ];

        let state = {
            xp: parseInt(localStorage.getItem('nx_xp')) || 0,
            lvl: parseInt(localStorage.getItem('nx_lvl')) || 1,
            search: '',
            cat: 'All'
        };

        // --- CORE FUNCTIONS ---
        function init() {
            renderSkeletons();
            setTimeout(renderGrid, 800); // Visual delay for skeleton load
            updateUIStats();
            initParticles();
            setupCursor();
            setupPanicKey();
        }

        function renderSkeletons() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = Array(4).fill(0).map(() => `
                <div class="h-64 rounded-[2rem] skeleton opacity-50"></div>
            `).join('');
        }

        function renderGrid() {
            const grid = document.getElementById('game-grid');
            const filtered = games.filter(g => 
                (state.cat === 'All' || g.category === state.cat) &&
                g.title.toLowerCase().includes(state.search.toLowerCase())
            );

            grid.innerHTML = filtered.map(g => `
                <div onclick="openDetail('${g.id}')" class="group relative h-64 rounded-[2rem] overflow-hidden glass border-white/5 hover:border-blue-500/50 transition-all duration-500 cursor-none">
                    <img src="${g.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent"></div>
                    <div class="absolute bottom-6 left-6">
                        <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">${g.category}</span>
                        <h3 class="text-2xl font-bold">${g.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const g = games.find(i => i.id === id);
            document.getElementById('detail-title').innerText = g.title;
            document.getElementById('detail-desc').innerText = g.desc;
            document.getElementById('detail-img').src = g.thumb;
            document.getElementById('detail-cat').innerText = g.category;
            document.getElementById('play-btn').onclick = () => launchGame(g);
            showPage('detail');
        }

        function launchGame(g) {
            // XP Gain
            state.xp += 25;
            if (state.xp >= 100) { state.xp = 0; state.lvl++; }
            localStorage.setItem('nx_xp', state.xp);
            localStorage.setItem('nx_lvl', state.lvl);
            updateUIStats();

            // Stealth Launch
            const win = window.open('about:blank', '_blank');
            win.document.title = "Google Docs";
            const iframe = win.document.createElement('iframe');
            iframe.src = g.url;
            iframe.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;border:none;";
            win.document.body.appendChild(iframe);
        }

        // --- UX ENHANCEMENTS ---
        function updateUIStats() {
            document.getElementById('user-level').innerText = state.lvl;
            document.getElementById('xp-progress').style.width = state.xp + '%';
            
            const ranks = ["Noob", "Apprentice", "Elite", "Pro", "Legend", "Nexus God"];
            const rankIdx = Math.min(Math.floor(state.lvl / 3), ranks.length - 1);
            document.getElementById('user-rank').innerText = ranks[rankIdx];
        }

        function setupCursor() {
            const cursor = document.getElementById('custom-cursor');
            window.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
            // Interactive scaling on hover
            document.addEventListener('mouseover', (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.closest('[onclick]')) {
                    cursor.style.transform = 'translate(-50%, -50%) scale(2.5)';
                    cursor.style.background = 'rgba(59, 130, 246, 0.1)';
                } else {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursor.style.background = 'transparent';
                }
            });
        }

        function setupPanicKey() {
            window.addEventListener('keydown', (e) => {
                if (e.key === '`') window.location.href = 'https://google.com';
            });
        }

        function showPage(p) {
            document.getElementById('page-home').classList.toggle('hidden', p !== 'home');
            document.getElementById('page-detail').classList.toggle('hidden', p !== 'detail');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- BACKGROUND PARTICLES ---
        function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let pts = [];
            
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            window.onresize = resize; resize();

            for(let i=0; i<60; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 });

            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = "rgba(59, 130, 246, 0.15)";
                pts.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                    if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        // Event Listeners
        document.getElementById('search-bar').oninput = (e) => { state.search = e.target.value; renderGrid(); };
        document.getElementById('cat-filter').onchange = (e) => { state.cat = e.target.value; renderGrid(); };

        init();
    </script>
</body>
</html>
