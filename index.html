<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Automatic Tab Cloak -->
    <title>Clever | Portal</title>
    <link rel="icon" type="image/png" href="https://support.highlandschools.org/wp-content/uploads/2020/11/clever1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { accent: 'rgba(var(--accent-color), <alpha-value>)' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Instant Theme & Settings Loader -->
    <script>
        const savedTheme = localStorage.getItem('nx_theme') || 'dark';
        const savedColor = localStorage.getItem('nx_color') || '59, 130, 246';
        const savedPerfMode = localStorage.getItem('nx_perfMode') === 'true';
        
        document.documentElement.className = savedTheme;
        if (savedPerfMode) document.documentElement.classList.add('perf-mode');
        document.documentElement.style.setProperty('--accent-color', savedColor);
    </script>

    <style>
        :root { 
            --accent-color: 59, 130, 246;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            overflow-x: hidden;
            cursor: none; /* Custom cursor */
        }
        .dark body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.7);
        }

        /* PERFORMANCE MODE OVERRIDES */
        html.perf-mode body { cursor: auto !important; }
        html.perf-mode #custom-cursor { display: none !important; }
        html.perf-mode * { box-shadow: none !important; }
        html.perf-mode .glass {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            background: #ffffff !important;
            border-bottom: 1px solid #e2e8f0;
        }
        html.dark.perf-mode .glass {
            background: #0f172a !important;
            border-bottom: 1px solid #1e293b;
        }

        /* Custom Cursor */
        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(var(--accent-color), 1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }
        body:active #custom-cursor {
            width: 15px;
            height: 15px;
            background: rgba(var(--accent-color), 0.5);
        }
        
        /* Modals & Animations */
        .modal-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* Dashboard Sidebar */
        #stats-dashboard {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #stats-dashboard.active {
            transform: translateX(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--accent-color), 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(var(--accent-color), 1); }

        /* SVG Icon Utilities */
        .icon { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body class="antialiased min-h-screen relative transition-colors duration-500">
    
    <!-- Background Elements -->
    <canvas id="live-bg" class="fixed inset-0 w-full h-full pointer-events-none z-0"></canvas>
    <div id="custom-cursor"></div>
    <div id="toast-container" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>

    <!-- Audio Player -->
    <audio id="bgm" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <!-- Initial Loader -->
    <div id="loader" class="fixed inset-0 z-[100] bg-white dark:bg-slate-900 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
        <h2 class="mt-4 text-2xl font-bold text-accent tracking-widest">NEXUS ELITE</h2>
    </div>

    <!-- Navigation -->
    <nav class="glass sticky top-0 z-40 border-b border-black/10 dark:border-white/10 p-4">
        <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
                <div class="w-10 h-10 bg-accent text-white rounded-xl flex items-center justify-center font-black text-xl shadow-lg shadow-accent/50">NX</div>
                <h1 class="text-2xl font-extrabold tracking-tight hidden sm:block">NEXUS <span class="text-accent">ELITE</span></h1>
            </div>

            <!-- Search -->
            <div class="flex-1 max-w-md relative">
                <input type="text" id="search-input" onkeyup="renderGrid()" placeholder="Search library..." class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-full px-10 py-2 focus:outline-none focus:border-accent transition-colors">
                <svg class="w-4 h-4 absolute left-4 top-3 opacity-50 icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>

            <!-- Header Controls (Icons applied via JS/HTML) -->
            <div class="flex items-center gap-2 text-black/70 dark:text-white/70">
                <button onclick="randomGame()" class="p-2 rounded-full hover:bg-black/10 dark:hover:bg-white/10 hover:text-accent transition" title="Random Game">
                    <svg class="w-5 h-5 icon" viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                </button>
                <button id="music-btn" onclick="toggleMusic()" class="p-2 rounded-full hover:bg-black/10 dark:hover:bg-white/10 hover:text-accent transition" title="Toggle Music">
                    <!-- Set by JS -->
                </button>
                <button id="cloak-btn" onclick="toggleCloak()" class="p-2 rounded-full hover:bg-black/10 dark:hover:bg-white/10 hover:text-accent transition" title="Tab Cloak">
                    <!-- Set by JS -->
                </button>
                <button onclick="toggleDashboard()" class="p-2 rounded-full hover:bg-black/10 dark:hover:bg-white/10 hover:text-accent transition" title="Stats Dashboard">
                    <svg class="w-5 h-5 icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                </button>
                <button onclick="toggleSettings()" class="p-2 rounded-full hover:bg-black/10 dark:hover:bg-white/10 hover:text-accent transition" title="Settings">
                    <svg class="w-5 h-5 icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>
        
        <!-- Categories -->
        <div class="max-w-7xl mx-auto mt-4 flex gap-2 overflow-x-auto pb-2" id="category-filters">
            <button onclick="setCategory('All')" class="cat-btn px-6 py-2 glass border border-white/10 rounded-full font-bold bg-accent text-white transition-colors">All</button>
            <button onclick="setCategory('Action')" class="cat-btn px-6 py-2 glass border border-white/10 rounded-full font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-colors">Action</button>
            <button onclick="setCategory('Driving')" class="cat-btn px-6 py-2 glass border border-white/10 rounded-full font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-colors">Driving</button>
            <button onclick="setCategory('Puzzle')" class="cat-btn px-6 py-2 glass border border-white/10 rounded-full font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-colors">Puzzle</button>
            <button onclick="setCategory('Sports')" class="cat-btn px-6 py-2 glass border border-white/10 rounded-full font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-colors">Sports</button>
            <button onclick="setCategory('Retro')" class="cat-btn px-6 py-2 glass border border-white/10 rounded-full font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-colors">Retro</button>
            <button onclick="setCategory('Misc')" class="cat-btn px-6 py-2 glass border border-white/10 rounded-full font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-colors">Misc</button>
            <button onclick="toggleAddGame()" class="px-6 py-2 border border-accent text-accent border-dashed rounded-full font-bold hover:bg-accent hover:text-white flex items-center gap-2 transition-colors ml-auto">
                <svg class="w-4 h-4 icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Custom
            </button>
        </div>
    </nav>

    <!-- MAIN CONTENT: HOME -->
    <main id="page-home" class="max-w-7xl mx-auto p-6 relative z-10">
        <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Games rendered here via JS -->
        </div>
    </main>

    <!-- MAIN CONTENT: DETAIL VIEW -->
    <main id="page-detail" class="hidden max-w-5xl mx-auto p-6 relative z-10" data-id="">
        <button onclick="showPage('home')" class="mb-6 px-4 py-2 bg-black/10 dark:bg-white/10 rounded-full font-bold hover:bg-accent hover:text-white transition flex items-center gap-2">
            <svg class="w-4 h-4 icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Back to Library
        </button>
        <div class="glass rounded-[3rem] p-8 border border-white/10 flex flex-col md:flex-row gap-8 shadow-2xl">
            <img id="detail-img" src="" class="w-full md:w-1/2 h-80 object-cover rounded-3xl shadow-lg border border-white/10">
            <div class="flex-1 flex flex-col justify-center">
                <h2 id="detail-title" class="text-5xl font-black mb-4 uppercase tracking-tighter"></h2>
                
                <div class="flex items-center gap-4 mb-6">
                    <div id="star-rating" class="text-3xl cursor-pointer flex gap-1">
                        <!-- Stars -->
                    </div>
                    <span class="text-sm opacity-50 font-bold uppercase tracking-wider">Rate Game</span>
                </div>

                <p id="detail-stats" class="text-lg font-bold text-accent mb-8 bg-accent/10 inline-block px-4 py-2 rounded-lg"></p>
                
                <button id="play-btn" class="bg-accent text-white px-8 py-4 rounded-2xl font-black text-2xl hover:scale-105 transition-transform shadow-[0_0_40px_rgba(var(--accent-color),0.5)]">
                    LAUNCH SECURE PIP
                </button>
            </div>
        </div>
    </main>

    <!-- PICTURE-IN-PICTURE (PiP) WINDOW -->
    <div id="pip-window" class="hidden fixed w-[800px] h-[500px] bg-slate-900 border-2 border-accent rounded-2xl shadow-2xl z-[60] overflow-hidden flex flex-col" style="top: 120px; left: 50%; transform: translateX(-50%); transition: width 0.3s, height 0.3s, border-radius 0.3s;">
        <div id="pip-header" class="bg-black text-white p-3 flex justify-between items-center cursor-move select-none border-b border-white/10">
            <div class="font-bold flex items-center gap-2 text-accent tracking-widest"><span class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span> <span id="pip-window-title">Game</span></div>
            <div class="flex gap-4">
                <button onclick="toggleFullscreenPip()" class="hover:text-accent font-bold" title="Toggle Fullscreen">
                    <svg class="w-4 h-4 icon" viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                </button>
                <button onclick="closePip()" class="hover:text-red-500 font-bold" title="Close">
                    <svg class="w-4 h-4 icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </div>
        <iframe id="pip-iframe" class="flex-1 w-full bg-black border-none"></iframe>
    </div>

    <!-- SIDEBAR: STATS DASHBOARD -->
    <div id="stats-dashboard" class="fixed top-0 right-0 w-80 h-full glass border-l border-white/10 z-50 p-6 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black text-accent tracking-tighter">DASHBOARD</h2>
            <button onclick="toggleDashboard()" class="hover:text-red-500 text-black dark:text-white transition">
                <svg class="w-6 h-6 icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div class="mb-8 p-4 bg-black/5 dark:bg-white/5 rounded-2xl border border-white/10 text-center">
            <p class="text-sm font-bold opacity-60 uppercase tracking-widest mb-1">Current Rank</p>
            <p id="user-rank" class="text-3xl font-black text-accent mb-3">NOOB</p>
            <div class="w-full h-3 bg-black/20 rounded-full overflow-hidden">
                <div id="xp-progress" class="h-full bg-accent w-0 transition-all duration-1000"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="p-4 bg-black/5 dark:bg-white/5 rounded-2xl text-center border border-white/10">
                <p class="text-2xl font-black" id="streak-counter">0</p>
                <p class="text-[10px] font-bold opacity-60 uppercase">Day Streak</p>
            </div>
            <div class="p-4 bg-black/5 dark:bg-white/5 rounded-2xl text-center border border-white/10">
                <p class="text-2xl font-black text-accent" id="total-time-global">0m</p>
                <p class="text-[10px] font-bold opacity-60 uppercase">Total Time</p>
            </div>
        </div>

        <h3 class="font-bold opacity-60 uppercase text-sm mb-4">Library Stats</h3>
        <div id="game-stats-list" class="flex-1 overflow-y-auto flex flex-col gap-2 pr-2">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- MODAL: ADD CUSTOM GAME -->
    <div id="add-game-modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md p-8 rounded-[2rem] border border-white/10 shadow-2xl modal-enter">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black tracking-tight">ADD <span class="text-accent">CUSTOM</span></h2>
                <button onclick="toggleAddGame()" class="hover:text-red-500 transition">
                    <svg class="w-6 h-6 icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase opacity-60 mb-2">Game Title</label>
                    <input type="text" id="cg-title" placeholder="e.g. My Cool Game" class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase opacity-60 mb-2">Game URL</label>
                    <input type="url" id="cg-url" placeholder="https://..." class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase opacity-60 mb-2">Cover Image URL (Optional)</label>
                    <input type="url" id="cg-img" placeholder="https://..." class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-accent">
                </div>
                <button onclick="saveCustomGame()" class="w-full bg-accent text-white font-bold py-4 rounded-xl mt-4 hover:scale-[1.02] transition-transform">ADD TO LIBRARY</button>
            </div>
        </div>
    </div>

    <!-- MODAL: SETTINGS -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm p-8 rounded-[2rem] border border-white/10 shadow-2xl modal-enter">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black tracking-tight">SYSTEM <span class="text-accent">SETTINGS</span></h2>
                <button onclick="toggleSettings()" class="hover:text-red-500 transition">
                    <svg class="w-6 h-6 icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-black/5 dark:bg-white/5 p-4 rounded-xl">
                    <span class="font-bold">Dark Mode</span>
                    <button onclick="toggleTheme()" class="px-4 py-1 bg-accent text-white rounded-full text-sm font-bold">Toggle</button>
                </div>

                <div class="flex justify-between items-center bg-black/5 dark:bg-white/5 p-4 rounded-xl">
                    <span class="font-bold">Live Background</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="live-bg-toggle" class="sr-only peer" onchange="toggleLiveBg()">
                        <div class="w-11 h-6 bg-gray-400 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-accent"></div>
                    </label>
                </div>

                <!-- PERFORMANCE MODE -->
                <div class="flex justify-between items-center bg-black/5 dark:bg-white/5 p-4 rounded-xl">
                    <div>
                        <span class="font-bold block">Performance Mode</span>
                        <span class="text-[10px] opacity-60 uppercase">Disables blurs & heavy VFX</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="perf-mode-toggle" class="sr-only peer" onchange="togglePerfMode()">
                        <div class="w-11 h-6 bg-gray-400 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-accent"></div>
                    </label>
                </div>
                
                <div class="pt-2">
                    <span class="font-bold block mb-3 opacity-60 uppercase text-xs">Accent Color</span>
                    <div class="flex gap-2">
                        <div onclick="setColor('59, 130, 246')" class="w-10 h-10 rounded-full bg-blue-500 cursor-pointer border-2 hover:scale-110 transition-transform"></div>
                        <div onclick="setColor('168, 85, 247')" class="w-10 h-10 rounded-full bg-purple-500 cursor-pointer border-2 hover:scale-110 transition-transform"></div>
                        <div onclick="setColor('239, 68, 68')" class="w-10 h-10 rounded-full bg-red-500 cursor-pointer border-2 hover:scale-110 transition-transform"></div>
                        <div onclick="setColor('16, 185, 129')" class="w-10 h-10 rounded-full bg-emerald-500 cursor-pointer border-2 hover:scale-110 transition-transform"></div>
                    </div>
                </div>

                <div class="pt-4 border-t border-black/10 dark:border-white/10">
                    <span class="font-bold block mb-3 opacity-60 uppercase text-xs">Data Management</span>
                    <div class="flex gap-2 text-sm">
                        <button onclick="exportData()" class="flex-1 bg-accent/20 text-accent font-bold py-2 rounded-xl hover:bg-accent hover:text-white transition flex items-center justify-center gap-2">
                            <svg class="w-4 h-4 icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Export
                        </button>
                        <label class="flex-1 bg-black/10 dark:bg-white/10 font-bold py-2 rounded-xl hover:bg-black/20 dark:hover:bg-white/20 transition cursor-pointer flex items-center justify-center gap-2">
                            <svg class="w-4 h-4 icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> Import
                            <input type="file" class="hidden" accept=".json" onchange="importData(event)">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CORE LOGIC -->
    <script>
        // SVG ICONS DICTIONARY
        const ICONS = {

        // Live Background Canvas Logic
        const canvas = document.getElementById('live-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;
        
        function initCanvas() {
            cancelAnimationFrame(animationId);
            document.getElementById('perf-mode-toggle').checked = state.perfMode;
            document.getElementById('live-bg-toggle').checked = state.liveBgOn;
            
            if (state.perfMode) {
                canvas.style.display = 'none';
                return; // Do not initialize intensive items
            }
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            particles = [];
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 0.5
                });
            }
            animateCanvas();
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animateCanvas() {
            if (!state.liveBgOn || state.perfMode) {
                canvas.style.display = 'none';
                return;
            }
            canvas.style.display = 'block';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = document.documentElement.className.includes('dark') ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)';
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            animationId = requestAnimationFrame(animateCanvas);
        }

        function toggleLiveBg() {
            state.liveBgOn = document.getElementById('live-bg-toggle').checked;
            save();
            if (state.liveBgOn && !state.perfMode) initCanvas();
        }
        
        function checkStreak() {
            const today = new Date().toDateString();
            if (state.lastLogin === today) {
                document.getElementById('streak-counter').innerText = state.streak;
                return;
            }
            
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (state.lastLogin === yesterday.toDateString()) {
                state.streak++;
            } else if (state.lastLogin) {
                state.streak = 1;
            } else {
                state.streak = 1; 
            }
            state.lastLogin = today;
            save();
            document.getElementById('streak-counter').innerText = state.streak;
            
            if(state.streak > 3) unlockBadge('On Fire', '3 Day Streak');
        }

        function updateRankUI() {
            let totalSeconds = Object.values(state.stats).reduce((acc, curr) => acc + curr.time, 0);
            let totalMinutes = Math.floor(totalSeconds / 60);

            const ranks = [
                { name: 'NOOB', min: 0, max: 30 },
                { name: 'GAMER', min: 30, max: 120 },
                { name: 'PRO', min: 120, max: 600 },
                { name: 'ELITE', min: 600, max: 1500 },
                { name: 'NEXUS LEGEND', min: 1500, max: 999999 }
            ];

            let currentRank = ranks[0];
            for (let r of ranks) {
                if (totalMinutes >= r.min) currentRank = r;
            }

            document.getElementById('user-rank').innerText = currentRank.name;
            
            let pct = 100;
            if (currentRank.max !== 999999) {
                const range = currentRank.max - currentRank.min;
                const earned = totalMinutes - currentRank.min;
                pct = Math.min(100, Math.max(0, (earned / range) * 100));
            }
            document.getElementById('xp-progress').style.width = pct + '%';
        }

        function renderGrid() {

            if (searchTerm) {

            }
            
            if (state.currentCategory !== 'All') {
                allGames = allGames.filter(g => (g.category || 'Misc') === state.currentCategory);
            }

            allGames.sort((a, b) => {
                const aFav = state.favorites.includes(a.id);
                const bFav = state.favorites.includes(b.id);
                if (aFav !== bFav) return bFav - aFav; 
                
                const aRate = state.ratings[a.id] || 0;
                const bRate = state.ratings[b.id] || 0;
                if (aRate !== bRate) return bRate - aRate;

                return a.title.localeCompare(b.title);
            });

                renderGrid();
            }, 1000);

            setInterval(updateTimeSpent, 5000);
        });
    </script>
</body>
